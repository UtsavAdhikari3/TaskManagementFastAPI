services:
  api:
    build: .
    container_name: task_rbac_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:16
    container_name: task_rbac_db
    environment:
      POSTGRES_DB: task_rbac_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
